<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Quick Ecommerce Solution by Sherve.dev">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sherve_mart">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <meta http-equiv="Content-Security-Policy" content="default-src * data: blob: filesystem: about: ws: wss: 'unsafe-inline' 'unsafe-eval'; connect-src *;">

  <title>Quick Ecommerce Customer</title>
  <link rel="manifest" href="manifest.json">

  <script>
    window.kilocaoWebConfig = {
      googleMapsApiKey: "customize_your_google_api_key",
      googleSignInClientId: "customize_your_xxxxxxx.googleusercontent.com",
    };

    (function configureOptionalGoogleIntegrations() {
      const config = window.kilocaoWebConfig || {};
      const hasGoogleMapsKey =
        config.googleMapsApiKey &&
        !config.googleMapsApiKey.startsWith("customize_your_");
      const hasGoogleSignInClientId =
        config.googleSignInClientId &&
        !config.googleSignInClientId.startsWith("customize_your_");

      if (hasGoogleMapsKey) {
        const mapsScript = document.createElement("script");
        mapsScript.async = true;
        mapsScript.src =
          `https://maps.googleapis.com/maps/api/js?key=${config.googleMapsApiKey}&loading=async`;
        document.head.appendChild(mapsScript);
      }

      if (hasGoogleSignInClientId) {
        const meta = document.createElement("meta");
        meta.name = "google-signin-client_id";
        meta.content = config.googleSignInClientId;
        document.head.appendChild(meta);
        window.googleClientID = config.googleSignInClientId;
      }
    })();
  </script>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
<script src="flutter_bootstrap.js" async=""></script>

<script>
     {{flutter_js}}
     {{flutter_build_config}}

     _flutter.loader.load({
       serviceWorker: {
         serviceWorkerVersion: {{flutter_service_worker_version}},
       },
       onEntrypointLoaded: function(engineInitializer) {
         engineInitializer.initializeEngine().then(function(appRunner) {
           if (document.getElementById('splash')) {
             document.getElementById('splash').remove();
           }
           if (document.getElementById('splash-branding')) {
             document.getElementById('splash-branding').remove();
           }
           document.body.style.background = "transparent";
           appRunner.runApp();
         });
       }
     });
</script>


</body></html>
